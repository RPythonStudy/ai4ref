# pytest.ini - pytest 설정 파일
[tool:pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# 테스트 마커 정의
markers =
    unit: 단위 테스트
    integration: 통합 테스트
    db: 데이터베이스 테스트
    slow: 느린 테스트
